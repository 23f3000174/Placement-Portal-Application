{% extends "base.html" %}
{% block title %}Create Drive - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle text-primary"></i> Create a Placement Drive</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('company.create_drive') }}">
                    <div class="mb-3">
                        <label class="form-label">Job Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="job_title" placeholder="e.g. Software Engineer" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea class="form-control" name="job_description" rows="4" placeholder="Describe the role, responsibilities..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Eligibility Criteria</label>
                        <input type="text" class="form-control" name="eligibility_criteria" placeholder="e.g. B.Tech CS/IT, CGPA > 7.0">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Salary</label>
                            <input type="text" class="form-control" name="salary" placeholder="e.g. 8,00,000 LPA">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-control" name="location" placeholder="e.g. Bangalore">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" class="form-control" name="application_deadline">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i> Save Drive</button>
                        <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
