{% extends "base.html" %}
{% block title %}Edit Drive - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="bi bi-pencil text-warning"></i> Edit Drive</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('company.edit_drive', drive_id=drive.id) }}">
                    <div class="mb-3">
                        <label class="form-label">Job Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="job_title" value="{{ drive.job_title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea class="form-control" name="job_description" rows="4">{{ drive.job_description or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Eligibility Criteria</label>
                        <input type="text" class="form-control" name="eligibility_criteria" value="{{ drive.eligibility_criteria or '' }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Salary</label>
                            <input type="text" class="form-control" name="salary" value="{{ drive.salary or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-control" name="location" value="{{ drive.location or '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" class="form-control" name="application_deadline"
                               value="{{ drive.application_deadline.strftime('%Y-%m-%d') if drive.application_deadline else '' }}">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning"><i class="bi bi-save me-1"></i> Update Drive</button>
                        <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
